<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS602 NetLab - Routing Visualizer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-bg"></div>
  <main class="layout">
    <header class="topbar card">
      <div>
        <h1>CS602 Routing Studio</h1>
        <p>Interactive routing lab with topology presets, path metrics, and failure simulation.</p>
      </div>

      <div class="controls-grid">
        <label>Topology
          <select id="topologyPreset"></select>
        </label>
        <label>Source
          <select id="source"></select>
        </label>
        <label>Destination
          <select id="destination"></select>
        </label>
        <label>Traffic Rate (packets/min)
          <input id="trafficRate" type="range" min="6" max="120" value="30" />
        </label>
        <div class="actions">
          <button id="sendPacket">Send Packet</button>
          <button id="toggleTraffic">Start Auto Traffic</button>
          <button id="toggleRandomFailure">Inject Random Failure</button>
          <button id="restoreLinks">Restore All Links</button>
        </div>
      </div>
    </header>

    <section class="grid">
      <article class="card stage">
        <canvas id="networkCanvas" width="980" height="560"></canvas>
      </article>

      <aside class="card sidebar">
        <h2>Route Metrics</h2>
        <div id="metrics" class="metrics"></div>

        <h2>Dijkstra Steps</h2>
        <pre id="dijkstraSteps"></pre>

        <h2>Routing Table</h2>
        <pre id="routingTable"></pre>

        <h2>Event Log</h2>
        <ul id="eventLog" class="event-log"></ul>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
